{% extends 'base.html' %}

{% block content %}
<h2>Eliminar Producto</h2>
<p>¿Estás seguro que deseas eliminar a "{{ product.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
