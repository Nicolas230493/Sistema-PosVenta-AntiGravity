{% extends 'base.html' %}
{% block content %}
<h2>Historial de Ventas</h2>
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Vendedor</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody>
        {% for sale in sales %}
        <tr>
            <td>#{{ sale.id }}</td>
            <td>{{ sale.date }}</td>
            <td>{{ sale.user }}</td>
            <td>${{ sale.total_amount }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
