{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Historial de Ventas</h2>
    <a href="{% url 'sales:export_consolidated_report' %}" class="btn btn-primary rounded-pill shadow-sm">
        <i class="bi bi-file-earmark-pdf me-2"></i>Descargar Reporte de Recaudación
    </a>
</div>
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Vendedor</th>
            <th>Total</th>
            <th class="text-end">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for sale in sales %}
        <tr>
            <td>#{{ sale.id }}</td>
            <td>{{ sale.date|date:"d/m/Y H:i" }}</td>
            <td>{{ sale.user.username }}</td>
            <td class="fw-bold">${{ sale.total_amount }}</td>
            <td class="text-end">
                <a href="{% url 'sales:export_sale_pdf' pk=sale.pk %}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-file-pdf me-1"></i> PDF
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
